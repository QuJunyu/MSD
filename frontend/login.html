<!DOCTYPE html> 
<html>
  <head>
    <meta charset="UTF-8">
    <title>Login - Campus Second-hand Book Trading Platform</title>
    <style>
     .login-container {
        width: 350px;
        margin: 100px auto; 
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
      .login-container h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;  
        margin-bottom: 5px;
      }
      .form-group input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      .message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 3px;
        text-align: center;
      }
      .message.error {
        color: #dc3545;
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
      }
      .message.success {
        color: #28a745;
        background-color: #d4edda;
        border: 1px solid #c3e6cb;
      }
      .forgot-password {
        text-align: right;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>User login</h2>
      <form id="loginForm">  
        <div class="form-group">
          <label>Username：</label>
          <input type="text" name="username">  
        </div>
        <div class="form-group">
          <label>Password：</label>
          <input type="password" name="password">
        </div>
        <!-- 新增忘记密码链接 -->
        <div class="forgot-password">
          <a href="forgot-password.html">Forgot password?</a>
        </div>
        <button type="submit">Login</button>
        <p>Don't have an account yet?<a href="register.html">Register immediately</a></p>
        <div id="message" class="message"></div>
      </form>
    </div>
      <script src="js/login-validate.js"></script>  
  </body>
</html>
</html>
