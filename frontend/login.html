<!D<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Login - Campus Second-hand Book Trading Platform</title>
    <style>
     .login-container {
        width: 350px;
        margin: 100px auto; 
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
      .login-container h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;  
        margin-bottom: 5px;
      }
      .form-group input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>User login</h2>
      <form id="loginForm">  
        <div class="form-group">
          <label>Username：</label>
          <input type="text" name="username" required>  
        </div>
        <div class="form-group">
          <label>Password：</label>
          <input type="password" name="password" required>
        </div>
        <button type="submit">Login</button>
        <p>Don't have an account yet?<a href="register.html">Register immediately</a></p> 
      </form>
    </div>
      <script src="js/login-validate.js"></script>  
  </body>
</html>
