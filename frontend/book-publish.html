<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Publish Book</title>
    <style>
        /* 保持原有样式，新增导航栏样式 */
        .navbar {
            margin-bottom: 30px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .navbar a {
            margin-right: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        /* 原有表单样式保持不变 */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- 新增导航栏：连接到其他页面 -->
    <div class="navbar">
        <a href="book-list.html">View all books</a>
        <a href="login.html" onclick="logout()">Log out</a>
    </div>

    <h2>Publish a New Book</h2>
    <form id="publishForm">
        <div class="form-group">
            <label for="title">Book Title:</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="author">Author:</label>
            <input type="text" id="author" name="author" required>
        </div>
        <div class="form-group">
            <label for="price">Price (¥):</label>
            <input type="number" id="price" name="price" step="0.01" min="0" required>
        </div>
        <div class="form-group">
            <label for="condition">Condition:</label>
            <select id="condition" name="condition" required>
                <option value="">Select condition</option>
                <option value="new">New</option>
                <option value="like-new">Like New</option>
                <option value="used">Used</option>
            </select>
        </div>
        <button type="submit">Release</button>
    </form>

    <!-- 引入发布书籍的脚本 -->
    <script src="js/book-publish.js"></script>
    <!-- 新增：添加退出登录的全局函数（与其他页面保持一致） -->
    <script>
        // 退出登录函数（与book-list.html保持一致）
        function logout() {
            localStorage.removeItem('token');
            alert('Logged out successfully');
        }
    </script>
</body>
</html>
