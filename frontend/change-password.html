<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Change password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: #28a745;
            background-color: #f0fff4;
            border: 1px solid #c3e6c3;
        }

        .error {
            color: #dc3545;
            background-color: #fff5f5;
            border: 1px solid #ffe3e3;
        }

        .navbar {
            margin-bottom: 30px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .navbar a {
            margin-right: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a href="book-publish.html">Publish a book</a>
            <a href="book-list.html">View all books</a>
            <a href="login.html" onclick="logout()">Log out</a>
        </div>
        
        <h2>Change password</h2>
        <form id="passwordForm">
            <div class="form-group">
                <label for="oldPassword">Old password：</label>
                <input type="password" id="oldPassword" name="oldPassword" placeholder="Please enter your old password.">
            </div>
            <div class="form-group">
                <label for="newPassword">New password：</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Please enter a new password.">
            </div>
            <button type="submit" class="btn">Confirm the revisions.</button>
            <div id="message" class="message"></div>
        </form>
    </div>
    <script src="js/change-password.js"></script>
</body>
</html>
