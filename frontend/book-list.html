<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>All the books</title>
    <style>
        /* 保持原有样式不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: #28a745;
            background-color: #f0fff4;
            border: 1px solid #c3e6c3;
        }

        .error {
            color: #dc3545;
            background-color: #fff5f5;
            border: 1px solid #ffe3e3;
        }

        .navbar {
            margin-bottom: 30px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .navbar a {
            margin-right: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .book-list {
            list-style: none;
            margin-top: 20px;
        }

        .book-item {
            padding: 20px;
            margin-bottom: 15px;
            background-color: #f9f9f9;
            border-radius: 6px;
            border-left: 4px solid #007bff;
        }

        .book-item h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .book-info {
            color: #666;
            line-height: 1.6;
        }

        .book-info span {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 5px;
        }

        .publish-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a href="book-publish.html">Publish a book</a>
            <a href="change-password.html">Change password</a>
            <a href="login.html" onclick="logout()">Log out</a>
        </div>
        
        <h2>All published books</h2>
        <div id="message" class="message"></div>
        <ul id="bookList" class="book-list">
            <li>Loading......</li>
        </ul>
    </div>

    <!-- 只保留外部脚本引用，删除内嵌脚本 -->
    <script src="js/book-list.js"></script>
</body>
</html>
