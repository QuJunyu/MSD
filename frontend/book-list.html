<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>All the books</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: #28a745;
            background-color: #f0fff4;
            border: 1px solid #c3e6c3;
        }

        .error {
            color: #dc3545;
            background-color: #fff5f5;
            border: 1px solid #ffe3e3;
        }

        .navbar {
            margin-bottom: 30px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .navbar a {
            margin-right: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .book-list {
            list-style: none;
            margin-top: 20px;
        }

        .book-item {
            padding: 20px;
            margin-bottom: 15px;
            background-color: #f9f9f9;
            border-radius: 6px;
            border-left: 4px solid #007bff;
        }

        .book-item h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .book-info {
            color: #666;
            line-height: 1.6;
        }

        .book-info span {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 5px;
        }

        .publish-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a href="book-publish.html">Publish a book</a>
            <a href="change-password.html">Change password</a>
            <a href="login.html" onclick="logout()">Log out</a>
        </div>
        
        <h2>All published books</h2>
        <div id="message" class="message"></div>
        <ul id="bookList" class="book-list">
            <!-- The list of books will be dynamically generated through JavaScript. -->
            <li>Loading......</li>
        </ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookList = document.getElementById('bookList');
            const messageDiv = document.getElementById('message');

            fetchBooks();

            function fetchBooks() {
                fetch('http://127.0.0.1:5000/api/book/all', {
                    method: 'GET'
                })
                .then(response => {
                    if (!response.ok) throw new Error('Failed to obtain the book');
                    return response.json();
                })
                .then(result => {
                    if (result.success) {
                        renderBooks(result.books);
                    } else {
                        showMessage(result.message, 'error');
                    }
                })
                .catch(error => {
                    showMessage(error.message, 'error');
                    bookList.innerHTML = '<li>Failed to load. Please refresh the page and try again.</li>';
                });
            }

            function renderBooks(books) {
                if (books.length === 0) {
                    bookList.innerHTML = '<li>Failed to load. Please refresh the page and try again.</li>';
                    return;
                }

                let html = '';
                books.forEach(book => {
                    const publishTime = new Date(book.publish_time).toLocaleDateString();
                    html += `
                        <li class="book-item">
                            <h3>${book.title}</h3>
                            <div class="book-info">
                                <span>Author：${book.author}</span>
                                <span>Price：¥${book.price}</span>
                                <span>Publisher：${book.username}</span>
                            </div>
                            <div class="publish-time">Release date：${publishTime}</div>
                        </li>
                    `;
                });
                bookList.innerHTML = html;
            }

            window.logout = function() {
                localStorage.removeItem('token');
            };

            function showMessage(text, type) {
                messageDiv.textContent = text;
                messageDiv.className = `message ${type}`;
            }
        });
    </script>
</body>
</html>
</body>
</html>
